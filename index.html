<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2024 Goodwin Champions — Collection Tracker</title>
<style>

  body{background:#080d16;color:#e2e8f0;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;}
  button{border:none;cursor:pointer;background:transparent;font-family:inherit;}
  input{font-family:inherit;}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:#0f172a;} ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}

  #header-inner{max-width:680px;margin:0 auto;}
  .title-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .eyebrow{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.6);text-transform:uppercase;margin-bottom:3px;}
  h1{font-size:20px;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px;}
  .subtitle{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;}
  .save-indicator{text-align:right;padding-top:4px;}
  .backup-row{display:flex;gap:6px;margin-top:7px;justify-content:flex-end;}
  .backup-btn{font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;cursor:pointer;border:none;transition:opacity 0.15s;}
  .backup-btn:active{opacity:0.7;}
  .btn-export{background:#1e3a5f;color:#93c5fd;}
  .btn-import{background:#1c1917;color:#a8a29e;}
  .import-ok{font-size:10px;color:#4ade80;margin-top:4px;text-align:right;display:none;}
  .saved-badge{font-size:11px;color:#166534;background:#052e16;padding:2px 8px;border-radius:4px;}
  .saving-badge{font-size:11px;color:#f97316;}
  .doubles-badge{margin-top:5px;font-size:11px;color:#f97316;}

  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat-card{background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);}
  .stat-label{font-size:10px;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .stat-val{font-size:18px;font-weight:800;color:#f1f5f9;font-family:monospace;}
  .stat-bar-track{margin-top:5px;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);}
  .stat-bar-fill{height:100%;border-radius:2px;background:#f97316;transition:width 0.4s;}

  .tabs{display:flex;}
  .tab-btn{flex:1;padding:10px 6px;border-bottom:2px solid transparent;color:rgba(255,255,255,0.55);font-size:11px;font-weight:400;transition:all 0.15s;text-align:center;border-left:none;border-right:none;border-top:none;}
  .tab-btn.active{border-bottom:2px solid #f97316;color:#f1f5f9;font-weight:700;}
  .tab-sub{font-size:10px;margin-top:1px;color:rgba(255,255,255,0.4);}
  .tab-btn.active .tab-sub{color:#f97316;}

  #content{max-width:680px;margin:0 auto;padding:14px 16px 80px;}
  .search-input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:13px;outline:none;margin-bottom:10px;}
  .section-hint{font-size:11px;color:#334155;margin-bottom:8px;padding-left:2px;}

  .card-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:3px;background:rgba(255,255,255,0.02);border:1px solid transparent;transition:all 0.15s;}
  .card-row.has{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);}
  .card-num{width:30px;height:30px;border-radius:6px;flex-shrink:0;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#475569;font-family:monospace;transition:all 0.15s;}
  .card-row.has .card-num{color:#000;}
  .card-info{flex:1;min-width:0;}
  .card-name{font-size:13px;font-weight:400;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.15s;}
  .card-row.has .card-name{font-weight:600;color:#f1f5f9;}
  .card-cat{font-size:10px;color:#334155;margin-top:1px;transition:all 0.15s;}
  .horiz-tag{margin-left:5px;font-size:10px;color:#475569;background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:3px;}

  .counter{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .counter-btn{width:24px;height:24px;border-radius:5px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#94a3b8;font-size:15px;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s;}
  .counter-btn.zero{opacity:0.3;}
  .counter-val{width:26px;text-align:center;font-size:14px;font-weight:700;font-family:monospace;color:#334155;}
  .counter-val.one{color:#f1f5f9;}
  .counter-val.many{color:#f97316;}

  /* Rare tab */
  .rare-group{margin-bottom:10px;}
  .rare-group-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:9px;color:#e2e8f0;text-align:left;}
  .rare-group-label{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;}
  .gc-dot{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0;}
  .group-collected{font-size:11px;color:#64748b;font-weight:400;}
  .rare-group-arrow{color:#475569;font-size:12px;}
  .rare-items{padding-left:8px;margin-top:3px;}
  .rare-item{margin-bottom:4px;}
  .rare-item-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:7px;background:rgba(255,255,255,0.02);color:#e2e8f0;text-align:left;}
  .rare-item-label{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;min-width:0;flex:1;}
  .item-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;}
  .item-note{font-size:10px;color:#475569;font-weight:400;white-space:nowrap;}
  .item-count{font-size:10px;font-weight:700;margin-left:2px;}
  .rare-item-arrow{color:#475569;font-size:11px;flex-shrink:0;}
  .rare-item-content{padding-left:6px;margin-top:2px;}

  /* Free text */
  .free-text-note{font-size:11px;color:#475569;margin-bottom:8px;font-style:italic;padding-left:2px;}
  .free-entry{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;margin-bottom:3px;background:rgba(255,255,255,0.05);}
  .free-entry-name{flex:1;font-size:13px;font-weight:600;color:#f1f5f9;}
  .free-remove{color:#475569;font-size:16px;padding:0 2px;}
  .free-add-row{display:flex;gap:6px;margin-top:8px;}
  .free-input{flex:1;padding:7px 10px;border-radius:7px;background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:12px;outline:none;}
  .free-add-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;}

  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* PIN LOCK */
  #pin-overlay{position:fixed;inset:0;background:#0f0f0f;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
  #pin-overlay.hidden{display:none;}
  .pin-title{color:#f1f5f9;font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .pin-sub{color:rgba(255,255,255,0.4);font-size:12px;margin-top:-16px;}
  .pin-dots{display:flex;gap:14px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.15s;}
  .pin-dot.filled{background:#f97316;}
  .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
  .pin-key{height:72px;border-radius:14px;background:rgba(255,255,255,0.07);color:#f1f5f9;font-size:22px;font-weight:700;border:none;cursor:pointer;transition:background 0.1s;}
  .pin-key:active{background:rgba(255,255,255,0.18);}
  .pin-key.del{font-size:16px;color:rgba(255,255,255,0.5);}
  .pin-error{color:#f87171;font-size:12px;height:16px;text-align:center;}
</style>
</head>

        </div>
        <div class="import-ok" id="import-ok">✓ Data loaded!</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Base Set</div>
        <div class="stat-val" id="base-stat">0 / 100</div>

      </button>
    </div>
  </div>
</div>

<div id="content">

    <div class="section-hint">Cards 1–90 · Horizontals 91–100</div>
    <div id="base-list"></div>
  </div>

  <div id="panel-splash" class="tab-panel">
    <input class="search-input" id="splash-search" placeholder="Search name, sport, or card #…" oninput="filterSplash(this.value)">

  <div id="panel-rare" class="tab-panel">

</div>

// ── STATE ────────────────────────────────────────────────────────────────────

const STORAGE_KEY = "goodwin2024-v4";
let counts = {};
let saveTimer = null;

function loadData() {
  try { const d = localStorage.getItem(STORAGE_KEY); if(d) counts = JSON.parse(d); } catch{}
}

function saveData() {
  const el = document.getElementById("save-status");
  if(el){ el.className="saving-badge"; el.textContent="Saving…"; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(counts)); } catch{}
    if(el){ el.className="saved-badge"; el.textContent="Saved ✓"; }
  }, 400);
}

  "Soccer":"#06b6d4","Soccer-W":"#06b6d4","Track":"#f43f5e","Fencing":"#8b5cf6","Kiteboarding":"#0ea5e9",

  "Actor":"#6366f1","Media":"#64748b","Hockey":"#38bdf8","Tennis":"#facc15","Literary":"#d97706","Relic":"#94a3b8",
};
const getCat = cat => CAT_COLORS[cat] || "#94a3b8";

// ── RENDER HELPERS ────────────────────────────────────────────────────────────

function cardRowHTML(card, countKey) {
  const c = counts[countKey]||0;
  const has = c>0;
  const cc = getCat(card.cat);
  const numBg = has ? cc : "#1e293b";
  const numClr = has ? "#000" : "#475569";
  const nameClr = has ? "#f1f5f9" : "#64748b";
  const nameWt = has ? "600" : "400";
  const catClr = has ? cc : "#334155";
  const rowBg = has ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.02)";
  const rowBorder = has ? "1px solid rgba(255,255,255,0.1)" : "1px solid transparent";
  const horizTag = card.tag==="H" ? `<span class="horiz-tag">HORIZ</span>` : "";
  const valClass = c===0?"":"counter-val "+(c===1?"one":"many");
  const decOpacity = c===0?" zero":"";
  return `<div class="card-row${has?" has":""}" id="row-${countKey}" style="background:${rowBg};border:${rowBorder}">
    <div class="card-num" style="background:${numBg};color:${numClr}">${card.n}</div>
    <div class="card-info">
      <div class="card-name" style="color:${nameClr};font-weight:${nameWt}">${card.name}${horizTag}</div>
      <div class="card-cat" style="color:${catClr}">${card.cat}</div>
    </div>
    <div class="counter">
      <button class="counter-btn${decOpacity}" onclick="dec('${countKey}')">−</button>
      <div class="counter-val ${c===0?'':c===1?'one':'many'}">${c}</div>
      <button class="counter-btn" onclick="inc('${countKey}')">+</button>
    </div>
  </div>`;
}

function freeTextHTML(itemId, accent) {
  const key = `ft-${itemId}`;
  let entries = [];
  try { entries = counts[key] ? JSON.parse(counts[key]) : []; } catch{}
  const entriesHTML = entries.map(e => `
    <div class="free-entry" id="fte-${e.id}" style="border:1px solid ${accent}33">
      <div class="free-entry-name">${e.name}</div>
      <div class="counter">
        <button class="counter-btn${e.qty<=1?" zero":""}" onclick="ftDec('${itemId}',${e.id})">−</button>
        <div class="counter-val ${e.qty===1?'one':'many'}">${e.qty}</div>
        <button class="counter-btn" onclick="ftInc('${itemId}',${e.id})">+</button>
      </div>
      <button class="free-remove" onclick="ftRemove('${itemId}',${e.id})">×</button>
    </div>`).join("");
  return `<div class="free-text-content" id="ft-content-${itemId}">
    ${entriesHTML}
    <div class="free-add-row">
      <input class="free-input" id="ft-input-${itemId}" style="border:1px solid ${accent}44" placeholder="Player / subject name…" onkeydown="if(event.key==='Enter')ftAdd('${itemId}','${accent}')">
      <button class="free-add-btn" style="border:1px solid ${accent}88;background:${accent}22;color:${accent}" onclick="ftAdd('${itemId}','${accent}')">Add</button>
    </div>
  </div>`;
}

// ── FREE TEXT OPS ─────────────────────────────────────────────────────────────

function getFtEntries(itemId) {
  const key = `ft-${itemId}`;
  try { return counts[key] ? JSON.parse(counts[key]) : []; } catch { return []; }
}
function setFtEntries(itemId, entries) {
  counts[`ft-${itemId}`] = JSON.stringify(entries);
  saveData();
}
function ftAdd(itemId, accent) {
  const inp = document.getElementById(`ft-input-${itemId}`);
  const name = inp.value.trim();
  if(!name) return;
  const entries = getFtEntries(itemId);
  entries.push({id: Date.now(), name, qty:1});
  setFtEntries(itemId, entries);
  inp.value = "";
  rerenderFtContent(itemId, accent);
  updateStats();
}
function ftInc(itemId, id) {
  const entries = getFtEntries(itemId).map(e => e.id===id ? {...e, qty:e.qty+1} : e);
  const accent = document.querySelector(`[data-item-id="${itemId}"]`)?.dataset.accent || "#94a3b8";
  setFtEntries(itemId, entries);
  rerenderFtContent(itemId, accent);
}
function ftDec(itemId, id) {
  let entries = getFtEntries(itemId).map(e => e.id===id ? {...e, qty:Math.max(0,e.qty-1)} : e).filter(e => e.qty > 0);
  const accent = document.querySelector(`[data-item-id="${itemId}"]`)?.dataset.accent || "#94a3b8";
  setFtEntries(itemId, entries);
  rerenderFtContent(itemId, accent);
}
function ftRemove(itemId, id) {
  const entries = getFtEntries(itemId).filter(e => e.id !== id);
  const accent = document.querySelector(`[data-item-id="${itemId}"]`)?.dataset.accent || "#94a3b8";
  setFtEntries(itemId, entries);
  rerenderFtContent(itemId, accent);
  updateStats();
}
function rerenderFtContent(itemId, accent) {
  const el = document.getElementById(`ft-content-${itemId}`);
  if(el) el.outerHTML = freeTextHTML(itemId, accent);
  updateItemCount(itemId);
}

// ── COUNTER OPS ───────────────────────────────────────────────────────────────

function inc(key) {
  counts[key] = (counts[key]||0) + 1;
  saveData();
  rerenderRow(key);
  updateStats();
}
function dec(key) {
  const c = counts[key]||0;
  if(!c) return;
  counts[key] = c - 1;
  saveData();
  rerenderRow(key);
  updateStats();
}
function rerenderRow(key) {
  const el = document.getElementById(`row-${key}`);
  if(!el) return;
  // find card from key
  const [prefix, ...rest] = key.split("-");
  let card = null;
  let pool = null;
  if(prefix === "base" || prefix === "splash") {
    const n = parseInt(rest[0]);
    pool = prefix === "base" ? BASE_SET : SPLASH_SET;
    card = pool.find(c => c.n === n);
  } else {
    // rare pools — find by composite key
    for(const g of RARE_GROUPS) {
      for(const item of g.items) {
        if(item.pool && !item.freeText) {
          const cardN = rest.join("-"); // rejoin in case card n has dashes
          const found = item.pool.find(c => String(c.n) === cardN && item.id === prefix);
          if(found) { card = found; break; }
        }
      }
      if(card) break;
    }
    if(!card) {
      // fallback: reconstruct from remaining key parts
      const itemId = key.substring(0, key.lastIndexOf("-"));
      const cardN = key.substring(key.lastIndexOf("-")+1);
      for(const g of RARE_GROUPS) {
        for(const item of g.items) {
          if(item.pool && item.id === itemId) {
            card = item.pool.find(c => String(c.n) === cardN);
            if(card) break;
          }
        }
        if(card) break;
      }
    }
  }
  if(card) el.outerHTML = cardRowHTML(card, key);
  // find the correct itemId by matching against known items
  let foundItemId = null;
  for(const g of RARE_GROUPS) {
    for(const item of g.items) {
      if(item.pool && item.pool.find(c => key === item.id + "-" + String(c.n))) {
        foundItemId = item.id; break;
      }
    }
    if(foundItemId) break;
  }
  if(foundItemId) updateItemCount(foundItemId);
}

function itemProgressText(item) {
  const have = getItemTotal(item);
  const size = getItemSize(item);
  if(size === null) return have > 0 ? have + " collected" : "";
  const pct = (have / size * 100).toFixed(0);
  return have + " / " + size + " (" + pct + "%)";
}

function groupProgressText(group) {
  let have = 0, total = 0;
  for(const item of group.items) {
    const size = getItemSize(item);
    if(size !== null) { have += getItemTotal(item); total += size; }
  }
  if(total === 0) { const gt = getGroupTotal(group); return gt > 0 ? gt + " collected" : ""; }
  const pct = (have / total * 100).toFixed(0);
  return have + " / " + total + " (" + pct + "%)";
}

function updateItemCount(itemId) {
  const badge = document.getElementById("item-count-" + itemId);
  if(!badge) return;
  const item = findItem(itemId);
  if(!item) return;
  badge.textContent = itemProgressText(item);
  // also update parent group header
  for(const g of RARE_GROUPS) {
    if(g.items.find(i => i.id === itemId)) {
      const gbadge = document.getElementById("group-progress-" + g.id);
      if(gbadge) gbadge.textContent = groupProgressText(g);
      break;
    }
  }
}

function findItem(itemId) {
  for(const g of RARE_GROUPS) {
    const found = g.items.find(i => i.id === itemId);
    if(found) return found;
  }
  return null;
}

function getItemSize(item) {
  if(item.freeText || !item.pool) return null;
  return item.pool.length;
}

function getItemTotal(item) {
  if(item.freeText || !item.pool) {
    try { return getFtEntries(item.id).length; } catch { return 0; }
  }
  return item.pool.filter(c => (counts[`${item.id}-${c.n}`]||0) > 0).length;
}

function getGroupTotal(group) {
  return group.items.reduce((acc, item) => acc + getItemTotal(item), 0);
}

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────

function exportData() {
  const payload = {
    version: "goodwin2024-v4",
    exported: new Date().toISOString(),
    counts: counts
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "goodwin2024-backup-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const payload = JSON.parse(e.target.result);
      if(!payload.counts) throw new Error("Invalid backup file");
      counts = payload.counts;
      saveData();
      renderBase();
      renderSplash();
      renderRare();
      updateStats();
      const ok = document.getElementById("import-ok");
      ok.style.display = "block";
      setTimeout(() => ok.style.display = "none", 3000);
    } catch(err) {
      alert("Could not load backup: " + err.message);
    }
    event.target.value = "";
  };
  reader.readAsText(file);
}

// ── STATS ─────────────────────────────────────────────────────────────────────

function updateStats() {
  const baseHave = BASE_SET.filter(c => (counts[`base-${c.n}`]||0) > 0).length;
  const splashHave = SPLASH_SET.filter(c => (counts[`splash-${c.n}`]||0) > 0).length;
  const dupes = [...BASE_SET, ...SPLASH_SET].reduce((a, c) => {
    const pfx = c.n <= 100 ? "base" : "splash";
    return a + Math.max(0, (counts[`${pfx}-${c.n}`]||0) - 1);
  }, 0);

  const basePct = (baseHave/BASE_SET.length*100).toFixed(0);
  const splashPct = (splashHave/SPLASH_SET.length*100).toFixed(0);
  document.getElementById("base-stat").textContent = `${baseHave} / ${BASE_SET.length} (${basePct}%)`;
  document.getElementById("splash-stat").textContent = `${splashHave} / ${SPLASH_SET.length} (${splashPct}%)`;
  document.getElementById("base-bar").style.width = `${basePct}%`;
  document.getElementById("splash-bar").style.width = `${splashPct}%`;
  document.getElementById("tab-base-sub").textContent = `${baseHave} / ${BASE_SET.length} (${basePct}%)`;
  document.getElementById("tab-splash-sub").textContent = `${splashHave} / ${SPLASH_SET.length} (${splashPct}%)`;

  const dd = document.getElementById("doubles-display");
  if(dupes > 0) { dd.style.display=""; dd.textContent = `${dupes} double${dupes!==1?"s":""}`; }
  else dd.style.display="none";

  // total cards including doubles across everything
  let totalCards = 0;
  // base + splash
  [...BASE_SET, ...SPLASH_SET].forEach(c => {
    const pfx = c.n <= 100 ? "base" : "splash";
    totalCards += counts[`${pfx}-${c.n}`] || 0;
  });
  // rare pools
  for(const g of RARE_GROUPS) {
    for(const item of g.items) {
      if(item.pool && !item.freeText) {
        item.pool.forEach(c => { totalCards += counts[`${item.id}-${c.n}`] || 0; });
      } else if(item.freeText || !item.pool) {
        try { totalCards += getFtEntries(item.id).reduce((a,e) => a + e.qty, 0); } catch{}
      }
    }
  }
  const td = document.getElementById("total-display");
  if(td) td.textContent = totalCards + " card" + (totalCards !== 1 ? "s" : "") + " total";
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────────

function switchTab(tabId) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`panel-${tabId}`).classList.add("active");
  document.querySelector(`[data-tab="${tabId}"]`).classList.add("active");
  if(tabId === "rare") {
    const searchEl = document.getElementById("rare-search");
    if(searchEl) searchEl.value = "";
    renderRare();
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────────

function filterRare(q) {
  const lq = q.toLowerCase();
  document.querySelectorAll(".rare-item").forEach(item => {
    const rows = item.querySelectorAll(".card-row");
    let itemMatch = false;
    rows.forEach(row => {
      const name = row.querySelector(".card-name")?.textContent.toLowerCase() || "";
      const cat = row.querySelector(".card-cat")?.textContent.toLowerCase() || "";
      const num = row.querySelector(".card-num")?.textContent.toLowerCase() || "";
      const match = !lq || name.includes(lq) || cat.includes(lq) || num.includes(lq);
      row.style.display = match ? "" : "none";
      if(match) itemMatch = true;
    });
    // Also match on item label itself
    const label = item.querySelector(".rare-item-label")?.textContent.toLowerCase() || "";
    if(!lq || label.includes(lq)) {
      item.style.display = "";
      rows.forEach(r => r.style.display = "");
    } else if(itemMatch) {
      item.style.display = "";
      // auto-expand when searching
      const content = item.querySelector(".rare-item-content");
      if(content && lq) content.style.display = "";
    } else {
      item.style.display = "none";
    }
  });
  // Show/hide groups based on whether they have visible items
  document.querySelectorAll(".rare-group").forEach(group => {
    const visibleItems = [...group.querySelectorAll(".rare-item")].some(i => i.style.display !== "none");
    group.style.display = visibleItems ? "" : "none";
    if(lq && visibleItems) {
      const gc = group.querySelector(".rare-items");
      if(gc) gc.style.display = "";
    }
  });
}

function filterBase(q) {
  const rows = document.querySelectorAll("#base-list .card-row");
  rows.forEach(row => {
    const name = row.querySelector(".card-name").textContent.toLowerCase();
    const cat = row.querySelector(".card-cat").textContent.toLowerCase();
    const num = row.querySelector(".card-num").textContent.toLowerCase();
    row.style.display = (!q || name.includes(q.toLowerCase()) || cat.includes(q.toLowerCase()) || num.includes(q.toLowerCase())) ? "" : "none";
  });
}
function filterSplash(q) {
  const rows = document.querySelectorAll("#splash-list .card-row");
  rows.forEach(row => {
    const name = row.querySelector(".card-name").textContent.toLowerCase();
    const cat = row.querySelector(".card-cat").textContent.toLowerCase();
    const num = row.querySelector(".card-num").textContent.toLowerCase();
    row.style.display = (!q || name.includes(q.toLowerCase()) || cat.includes(q.toLowerCase()) || num.includes(q.toLowerCase())) ? "" : "none";
  });
}

// ── RARE ACCORDION ────────────────────────────────────────────────────────────

function toggleGroup(groupId) {
  const content = document.getElementById(`gc-${groupId}`);
  const arrow = document.getElementById(`ga-${groupId}`);
  const isOpen = content.style.display !== "none";
  content.style.display = isOpen ? "none" : "";
  arrow.textContent = isOpen ? "▼" : "▲";
}
function toggleItem(itemId) {
  const content = document.getElementById(`ic-${itemId}`);
  const arrow = document.getElementById(`ia-${itemId}`);
  const isOpen = content.style.display !== "none";
  content.style.display = isOpen ? "none" : "";
  arrow.textContent = isOpen ? "▼" : "▲";
}

// ── RENDER RARE TAB ───────────────────────────────────────────────────────────

function renderRare() {
  const list = document.getElementById("rare-list");
  list.innerHTML = RARE_GROUPS.map(group => {
    const gt = getGroupTotal(group);
    const itemsHTML = group.items.map(item => {
      const it = getItemTotal(item);
      const contentHTML = (item.freeText || !item.pool)
        ? freeTextHTML(item.id, item.accent)
        : item.pool.map(card => cardRowHTML(card, `${item.id}-${card.n}`)).join("");
      return `<div class="rare-item">
        <button class="rare-item-btn" style="border:1px solid ${item.accent}44" onclick="toggleItem('${item.id}')" data-item-id="${item.id}" data-accent="${item.accent}">
          <span class="rare-item-label">
            <span class="item-dot" style="background:${item.accent}"></span>
            <span style="color:${item.accent}">${item.label}</span>
            <span class="item-note">${item.note}</span>
            <span class="item-count" id="item-count-${item.id}" style="color:${item.accent}">${itemProgressText(item)}</span>
          </span>
          <span class="rare-item-arrow" id="ia-${item.id}">▼</span>
        </button>
        <div class="rare-item-content" id="ic-${item.id}" style="display:none">${contentHTML}</div>
      </div>`;
    }).join("");

    return `<div class="rare-group">
      <button class="rare-group-btn" style="border:1px solid ${group.gc}33;background:${group.gc}11" onclick="toggleGroup('${group.id}')">
        <span class="rare-group-label">
          <span class="gc-dot" style="background:${group.gc}"></span>
          ${group.label}
          ${groupProgressText(group)?"<span id=\"group-progress-" + group.id + "\" class=\"group-collected\">" + groupProgressText(group) + "</span>":"<span id=\"group-progress-" + group.id + "\" class=\"group-collected\"></span>"}
        </span>
        <span class="rare-group-arrow" id="ga-${group.id}">▼</span>
      </button>
      <div class="rare-items" id="gc-${group.id}" style="display:none">${itemsHTML}</div>
    </div>`;
  }).join("");
}

// ── INIT ──────────────────────────────────────────────────────────────────────

function renderBase() {
  document.getElementById("base-list").innerHTML = BASE_SET.map(c => cardRowHTML(c, `base-${c.n}`)).join("");
}
function renderSplash() {
  document.getElementById("splash-list").innerHTML = SPLASH_SET.map(c => cardRowHTML(c, `splash-${c.n}`)).join("");
}

loadData();
renderBase();
renderSplash();
renderRare();
updateStats();

// Tab clicks
document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if(btn) switchTab(btn.dataset.tab);
});

// ── PIN LOCK ──────────────────────────────────────────────────────────────────
const PIN = "3755";
let pinEntry = "";

function pinKey(d) {
  if(pinEntry.length >= 4) return;
  pinEntry += d;
  updatePinDots();
  if(pinEntry.length === 4) {
    if(pinEntry === PIN) {
      document.getElementById("pin-overlay").classList.add("hidden");
    } else {
      document.getElementById("pin-error").textContent = "Incorrect PIN";
      setTimeout(() => { pinEntry = ""; updatePinDots(); document.getElementById("pin-error").textContent = ""; }, 800);
    }
  }
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
}

function pinClear() {
  pinEntry = "";
  updatePinDots();
}

function updatePinDots() {
  for(let i = 0; i < 4; i++) {
    document.getElementById("pd" + i).classList.toggle("filled", i < pinEntry.length);
  }
}

</script>
